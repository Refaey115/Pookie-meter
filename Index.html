<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>How are you feeling? 🐾</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #dce9ff 0%, #f0d4ff 45%, #ffd6e7 100%);
      font-family: 'Quicksand', sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 28px 16px;
      position: relative; overflow-x: hidden;
    }

    .deco { position:fixed; pointer-events:none; user-select:none; animation:floatUp linear infinite; opacity:.4; }
    @keyframes floatUp {
      0%  { transform:translateY(110vh) rotate(0deg);  opacity:0; }
      10% { opacity:.4; } 90% { opacity:.4; }
      100%{ transform:translateY(-10vh) rotate(15deg); opacity:0; }
    }

    .page { display:none; width:100%; max-width:800px; flex-direction:column; align-items:center; animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both; }
    .page.active { display:flex; }
    @keyframes popIn { from{opacity:0;transform:scale(.88) translateY(18px)} to{opacity:1;transform:scale(1) translateY(0)} }

    .main-title { font-size:clamp(1.3rem,4vw,2rem); font-weight:700; color:#5a3060; margin-bottom:4px; text-align:center; }
    .sub-title   { font-size:.9rem; color:#9a70a8; margin-bottom:32px; text-align:center; }

    /* ── scale ── */
    .scale { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; width:100%; }

    .mood-card {
      background: rgba(255,255,255,.75);
      border: 3px solid transparent;
      border-radius: 24px;
      padding: 18px 12px 14px;
      cursor: pointer;
      width: 118px;
      display: flex; flex-direction:column; align-items:center; gap:10px;
      transition: transform .22s, border-color .22s, box-shadow .22s, background .22s;
      box-shadow: 0 4px 18px rgba(100,60,120,.1);
      position: relative;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Quicksand', sans-serif;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
    }
    .mood-card:hover  { transform:translateY(-8px) scale(1.07); box-shadow:0 12px 32px rgba(100,60,120,.2); }
    .mood-card:active { transform:scale(.96); }
    .mood-card.selected { border-color:var(--acc); background:rgba(255,255,255,.95); box-shadow:0 10px 32px rgba(100,60,120,.25); transform:translateY(-10px) scale(1.08); }

    .mood-card svg { width:80px; height:80px; display:block; }
    .mood-label { font-size:1rem; font-weight:700; color:#5a3060; text-align:center; direction:rtl; }
    .tap-hint { font-size:.68rem; color:#b090c0; margin-top:-4px; }

    .mood-card[data-mood="ma3mos"]   { --acc:#a8c4f0; }
    .mood-card[data-mood="mojamad"]  { --acc:#7ec8e3; }
    .mood-card[data-mood="mohabbab"] { --acc:#ff85a1; }
    .mood-card[data-mood="mohamas"]  { --acc:#f4c430; }
    .mood-card[data-mood="mohammer"] { --acc:#e07020; }
    .mood-card[data-mood="mojammar"] { --acc:#e03020; }

    /* ── response card ── */
    .resp-card {
      background: rgba(255,255,255,.82);
      border-radius: 34px;
      padding: 46px 38px 38px;
      width: min(92vw, 480px);
      text-align:center;
      box-shadow: 0 8px 40px rgba(100,60,120,.18);
      display:flex; flex-direction:column; align-items:center; gap:14px;
    }
    .resp-cat svg { display:block; }
    .resp-title { font-size:1.65rem; font-weight:700; color:#5a3060; line-height:1.45; }
    .resp-sub   { font-size:1rem; color:#b06090; }
    .hearts-row { font-size:1.5rem; letter-spacing:6px; animation:hb 1.2s ease infinite; }
    @keyframes hb { 0%,100%{transform:scale(1)} 50%{transform:scale(1.22)} }

    .btn-back {
      margin-top:6px;
      background:transparent; border:2px solid #dda0bb; border-radius:50px;
      color:#b06090; cursor:pointer; font-family:'Quicksand',sans-serif;
      font-size:.85rem; font-weight:700; padding:8px 26px; transition:all .2s;
    }
    .btn-back:hover { background:#ffeef5; border-color:#ff85a1; }

    /* fireplace */
    @keyframes flicker1 { 0%,100%{transform:scaleY(1) scaleX(1)} 33%{transform:scaleY(1.12) scaleX(.94)} 66%{transform:scaleY(.94) scaleX(1.06)} }
    @keyframes flicker2 { 0%,100%{transform:scaleY(.96) scaleX(1)} 40%{transform:scaleY(1.14) scaleX(.92)} }
    .fl1 { transform-origin:50% 100%; animation:flicker1 .75s ease-in-out infinite; }
    .fl2 { transform-origin:50% 100%; animation:flicker2 .55s ease-in-out infinite; }
    @keyframes drip { 0%{transform:scaleY(0);opacity:1} 65%{transform:scaleY(1);opacity:1} 100%{transform:scaleY(1) translateY(14px);opacity:0} }
    .dp  { transform-origin:50% 0; animation:drip 2s ease-in-out infinite; }
    .dp:nth-child(2){ animation-delay:.65s; }
    .dp:nth-child(3){ animation-delay:1.3s; }
    @keyframes wakey { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-12px) rotate(3deg)} }
    .wakey { animation:wakey 1.3s ease-in-out infinite; display:inline-block; }

    .pookie { position:fixed; bottom:14px; right:18px; font-size:.72rem; color:#c08899; font-style:italic; z-index:100; }
  </style>
</head>
<body>

<!-- ══════ PAGE 1 — PICKER ══════ -->
<div class="page active" id="page-pick">

  <div class="sub-title">what are you feeling today, Pookie ♡?</div>

  <div class="scale">

    <!-- ① معمص — sleepy -->

        <!-- intense squinting eyes -->

        <path d="M57 59 Q62 55 67 59" stroke="#1a0000" stroke-width="2.8" stroke-linecap="round" fill="none"/>
        <!-- lid squint -->
        <path d="M32 58 Q38 62 44 58" stroke="#c02010" stroke-width="3.2" stroke-linecap="round" fill="none"/>
        <path d="M56 58 Q62 62 68 58" stroke="#c02010" stroke-width="3.2" stroke-linecap="round" fill="none"/>
        <!-- nose -->
        <path d="M47 67 L50 64 L53 67 Z" fill="#7a0010"/>
        <!-- grimace teeth -->
        <path d="M40 74 Q45 70 50 72 Q55 70 60 74" stroke="#5a0008" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        <!-- whiskers -->
        <line x1="14" y1="65" x2="30" y2="67" stroke="#ff6600" stroke-width="1.4" stroke-linecap="round" opacity=".7"/>
        <line x1="14" y1="70" x2="30" y2="69" stroke="#ff6600" stroke-width="1.4" stroke-linecap="round" opacity=".7"/>
        <line x1="70" y1="67" x2="86" y2="65" stroke="#ff6600" stroke-width="1.4" stroke-linecap="round" opacity=".7"/>
        <line x1="70" y1="69" x2="86" y2="70" stroke="#ff6600" stroke-width="1.4" stroke-linecap="round" opacity=".7"/>
        <!-- sweat drop -->
        <path d="M72 42 Q74 37 72 32 Q70 37 72 42Z" fill="#60d8ff" opacity=".9"/>
        <!-- embers -->
        <circle cx="16" cy="38" r="2.2" fill="#ff9900" opacity=".8"/>
        <circle cx="82" cy="32" r="2"   fill="#ff6600" opacity=".9"/>
        <circle cx="10" cy="58" r="1.8" fill="#ffcc00" opacity=".7"/>
        <circle cx="88" cy="52" r="1.8" fill="#ffcc00" opacity=".7"/>

    </button>

  </div>
</div>

<!-- ══════ PAGE 2 — RESPONSE ══════ -->
<div class="page" id="page-resp">
  <div class="resp-card">
    <div id="resp-cat"></div>
    <div class="resp-title" id="resp-title"></div>
    <div class="resp-sub"   id="resp-sub"></div>
    <div class="hearts-row" id="resp-hearts">💕 💗 💕</div>
    <button class="btn-back" onclick="goBack()">← back</button>
  </div>
</div>

<div class="pookie">pookie designs</div>

<script>
  // floating deco
  const decos = ['🐱','🐾','💗','💕','🌸','💖','🐈','✨','🌷','💝','❄','🔥','💞','🐈‍⬛'];
  function spawnDeco() {
    const el = document.createElement('div');
    el.className = 'deco';
    el.textContent = decos[Math.floor(Math.random() * decos.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (1 + Math.random() * 1.6) + 'rem';
    const dur = 7 + Math.random() * 8;
    el.style.animationDuration = dur + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000);
  }
  setInterval(spawnDeco, 700);
  for (let i = 0; i < 6; i++) setTimeout(spawnDeco, i * 400);

  function pickMood(card) {
    document.querySelectorAll('.mood-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    setTimeout(() => {
      buildResponse(card.dataset.mood);
      document.getElementById('page-pick').classList.remove('active');
      document.getElementById('page-resp').classList.add('active');
      for (let i = 0; i < 20; i++) setTimeout(spawnDeco, i * 80);
    }, 260);
  }

  // iOS Safari fix — attach touch + click listeners to every card
  document.querySelectorAll('.mood-card').forEach(card => {
    let touched = false;
    card.addEventListener('touchstart', () => { touched = true; }, { passive: true });
    card.addEventListener('touchend', e => {
      e.preventDefault();
      pickMood(card);
    }, { passive: false });
    card.addEventListener('click', () => {
      if (!touched) pickMood(card);
      touched = false;
    });
  });

  function goBack() {
    document.getElementById('page-resp').classList.remove('active');
    document.getElementById('page-pick').classList.add('active');
  }

  function buildResponse(mood) {
    const catEl   = document.getElementById('resp-cat');
    const titleEl = document.getElementById('resp-title');
    const subEl   = document.getElementById('resp-sub');
    const hEl     = document.getElementById('resp-hearts');

    // grab the svg from the picker card
    const cardSvg = document.querySelector(`.mood-card[data-mood="${mood}"] svg`).outerHTML;

    if (['mohammer','mojammar','mohamas'].includes(mood)) {
      catEl.innerHTML = `<div style="width:130px;height:130px;display:flex;align-items:center;justify-content:center">${cardSvg}</div>`;
      catEl.querySelector('svg').style.cssText = 'width:130px;height:130px';
      titleEl.textContent = 'I love you so much pookie 🐾';
      subEl.textContent   = 'I hope you feel better soon 💗';
      hEl.textContent     = '💕 💗 💕 💗 💕';

    } else if (mood === 'mohabbab') {
      catEl.innerHTML = `<div style="width:130px;height:130px;display:flex;align-items:center;justify-content:center">${cardSvg}</div>`;
      catEl.querySelector('svg').style.cssText = 'width:130px;height:130px';
      titleEl.textContent = 'I love you so much more pookie';
      subEl.textContent   = 'if that\'s even possible 💖✨';
      hEl.textContent     = '💕 💗 💕 💗 💕';

    } else if (mood === 'mojamad') {
      catEl.innerHTML = `
        <svg viewBox="0 0 220 130" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:220px;height:130px">
          <!-- fireplace -->
          <rect x="6" y="62" width="72" height="60" rx="5" fill="#8b4513"/>
          <rect x="13" y="68" width="58" height="46" rx="3" fill="#1a0800"/>
          <g class="fl1"><path d="M26 108 C24 92 30 78 35 70 C32 82 37 84 34 72 C39 82 37 88 42 78 C42 90 38 96 42 108Z" fill="#ff6600"/></g>
          <g class="fl2"><path d="M38 108 C36 94 42 82 44 74 C42 84 47 86 49 76 C49 88 45 96 49 108Z" fill="#ffaa00"/></g>
          <path d="M24 108 C27 99 36 95 41 108Z" fill="#ffdd00"/>
          <rect x="2" y="58" width="80" height="10" rx="3" fill="#a0522d"/>
          <ellipse cx="43" cy="108" rx="34" ry="5" fill="#ff6600" opacity=".18"/>
          <!-- frozen cat warming up -->
          <circle cx="162" cy="66" r="36" fill="#e0f4ff" stroke="#7ec8e3" stroke-width="2"/>
          <polygon points="138,50 146,26 154,50" fill="#c8e8f8" stroke="#7ec8e3" stroke-width="1.5"/>
          <polygon points="170,50 178,26 186,50" fill="#c8e8f8" stroke="#7ec8e3" stroke-width="1.5"/>
          <!-- warming happy eyes -->
          <path d="M148 62 Q155 57 162 62" stroke="#3a90c8" stroke-width="2.8" stroke-linecap="round" fill="none"/>
          <path d="M162 62 Q169 57 176 62" stroke="#3a90c8" stroke-width="2.8" stroke-linecap="round" fill="none"/>
          <!-- smile thawing -->
          <path d="M154 74 Q162 80 170 74" stroke="#5090b8" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <!-- melting ice drips -->
          <g class="dp"><line x1="150" y1="102" x2="150" y2="114" stroke="#a8d8f0" stroke-width="3.5" stroke-linecap="round"/></g>
          <g class="dp"><line x1="162" y1="104" x2="162" y2="118" stroke="#a8d8f0" stroke-width="3.5" stroke-linecap="round"/></g>
          <g class="dp"><line x1="174" y1="102" x2="174" y2="114" stroke="#a8d8f0" stroke-width="3.5" stroke-linecap="round"/></g>
          <!-- warm glow on cat -->
          <ellipse cx="118" cy="82" rx="16" ry="22" fill="#ff9900" opacity=".1"/>
          <!-- paw reaching toward fire -->
          <ellipse cx="120" cy="90" rx="12" ry="7" fill="#c8e8f8" stroke="#7ec8e3" stroke-width="1.5" transform="rotate(-25,120,90)"/>
          <!-- snowflake still on top -->
          <text x="174" y="24" font-size="12" fill="#7ec8e3" opacity=".6">❄</text>
        </svg>`;
      titleEl.textContent = 'come warm up pookie 🔥';
      subEl.textContent   = 'let all that ice melt away 🧊 → 💧';
      hEl.textContent     = '💕 🔥 💕';

    } else if (mood === 'ma3mos') {
      catEl.innerHTML = `<div class="wakey" style="width:130px;height:130px;display:flex;align-items:center;justify-content:center">${cardSvg}</div>`;
      catEl.querySelector('svg').style.cssText = 'width:130px;height:130px';
      titleEl.textContent = 'wakey wakey pookie ☀️';
      subEl.textContent   = 'rise and shine, I love you 💗';
      hEl.textContent     = '💕 ☀️ 💕';
    }
  }
</script>
</body>
</html>
